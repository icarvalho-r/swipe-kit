# FASE 5: STORYTELLING
# =====================================================================
historia:
  background_story:
    tipo: "guru"
    spokesperson:
      nome: "Dr. Henrique Duarte"
      titulo: "Neurocientista e Diretor de Pesquisa"
      instituicao: "Instituto Brasileiro de Neurociencia Aplicada"
      credenciais:
        - "Neurocientista ha 19 anos"
        - "Diretor de pesquisa do Instituto Brasileiro de Neurociencia Aplicada"
        - "Protocolo ja ajudou mais de 32 mil brasileiros"
        - "Entrevistado pela Folha, Veja Saude e Bem Estar da Globo"
    texto: |
      Meu nome e Dr. Henrique Duarte. Sou neurocientista ha 19 anos e diretor
      de pesquisa do Instituto Brasileiro de Neurociencia Aplicada, o maior
      centro de estudos sobre longevidade cognitiva do pais.

      Nos ultimos 8 anos, meu trabalho tem se dedicado exclusivamente a entender
      por que o cerebro humano comeca a falhar depois dos 50 — e o que pode ser
      feito pra reverter isso. Meu protocolo ja ajudou mais de 32 mil brasileiros
      a recuperar a clareza mental que achavam que tinham perdido pra sempre.

      Ja fui entrevistado pela Folha de Sao Paulo, pela revista Veja Saude e pelo
      programa Bem Estar da Globo. Mas nada disso importa perto do que eu vou te
      contar agora.

      Porque o motivo de eu ter gravado esse video nao sao meus titulos.
      E por causa da minha mae.

  emotional_story:
    personagem: "Dona Tereza — mae do Dr. Henrique"
    relacao_com_spokesperson: "Mae, 67 anos, aposentada, viuva"
    problema: "Perda progressiva de memoria ate nao lembrar o caminho de casa"
    solucoes_que_tentou:
      - "Ginkgo Biloba (3 meses, sem resultado)"
      - "Omega 3, Fosfatidilserina, Complexo B (sem resultado)"
      - "Palavras cruzadas e apps de exercicio mental (frustrada)"
      - "Donepezila (nausea severa)"
      - "Rivastigmina (diarreia e tontura)"
      - "Geriatra disse: 'e a idade, a gente tenta controlar, mas reverter...'"
    frustracoes:
      - "Medo de sair de casa sozinha"
      - "Parou de atender telefone (vergonha)"
      - "Parou de ir na missa (confundia horarios)"
      - "Parou de fazer bolo (esquecia ingredientes)"
      - "Medo de virar a avo paterna (morreu com Alzheimer)"
    fundo_do_poco: |
      Saiu pra comprar pao na padaria da esquina — 3 quadras de casa,
      ia la todo dia ha 15 anos. Nao voltou. Encontrada sentada num banco
      de praca, 6 quadras de casa, chorando com o saco de pao na mao.
      Disse: "Filho, eu nao lembrava o caminho de volta pra casa."
    motivacao_heroi: |
      Naquela noite, Dr. Henrique foi pro escritorio e fez uma promessa:
      "Eu sou neurocientista. Se eu nao conseguir ajudar minha propria mae,
      de que adianta tudo que eu estudei?" Comecou a pesquisar de um jeito
      diferente — nao ia aceitar "e a idade" como resposta.
    texto: |
      Minha mae, Dona Tereza, tem 67 anos. Aposentada, viuva do meu pai ha
      4 anos. A vida inteira foi aquela mae que acordava 5 da manha pra fazer
      cafe pros filhos. Trabalhou 30 anos como costureira — cortava, media,
      costurava, tudo de cabeca. Nunca precisou de regua. Memoria de elefante,
      a gente brincava.

      Depois que meu pai faleceu, minha mae se reinventou. Comecou a cuidar dos
      netos no fim de semana, fazia bolo de milho todo sabado, ia na missa
      domingo de manha. Decorava o aniversario de todo mundo da familia — tio,
      primo, vizinho. A gente dizia: "Dona Tereza esquece de nada."

      Ate que um dia, ela me ligou e falou: "Filho, esqueci o nome daquela
      vizinha que mora do lado de casa ha 12 anos. Fiquei 20 minutos tentando
      lembrar e nada." Eu falei: "Mae, acontece, e normal." Nao dei
      importancia. Mas nas semanas seguintes, comecou a acontecer de novo.
      E de novo. E cada vez pior.

      Minha mae comecou a entrar na cozinha e ficar parada, olhando pro nada,
      sem lembrar o que foi fazer ali. Perdia as chaves 3, 4 vezes por semana.
      Ia contar uma historia pros netos e parava no meio — "como e que era
      mesmo?" Repetia a mesma pergunta 5 minutos depois de ter feito. Esquecia
      que ja tinha tomado o remedio e tomava de novo. Queimou 3 panelas porque
      esquecia no fogo.

      O pior era quando a gente tava conversando e ela dava aquele "branco"
      no meio da frase. Os olhos perdiam o foco. Ficava um silencio estranho.
      E eu via nos olhos dela: vergonha. Vergonha de nao conseguir mais
      completar um pensamento.

      Eu sou neurocientista. Deveria saber o que fazer. Comprei Ginkgo Biloba
      da melhor marca — ela tomou 3 meses, nao mudou nada. Comprei Omega 3,
      Fosfatidilserina, complexo B. Montei uma farmacia na casa dela. Nada.

      Dei um livro de palavras cruzadas. Ela tentava, mas ficava frustrada
      porque nao conseguia lembrar as respostas que antes eram obvias. Baixei
      app de exercicio mental no celular. Ela nao conseguia nem lembrar a
      senha pra abrir.

      Levei num geriatra que receitou Donepezila. Deu nausea tao forte que
      ela nao conseguia comer. Trocou por Rivastigmina — deu diarreia e
      tontura. O medico falou: "Dr. Henrique, o senhor sabe como e. E a
      idade. A gente tenta controlar, mas reverter..."

      Minha mae comecou a ter medo. Medo de sair de casa sozinha e nao
      conseguir voltar. Medo de esquecer de apagar o fogao e colocar fogo
      na casa. Medo de olhar pros netos e nao lembrar o nome deles.

      Ela parou de atender o telefone porque tinha vergonha de perguntar
      "quem ta falando?" pra gente que ela conhecia ha 20 anos. Parou de ir
      na missa porque se confundia com os horarios. Parou de fazer bolo
      porque esquecia os ingredientes no meio da receita.

      Um dia ela me disse: "Henrique, eu to virando a sua avo." Minha avo
      paterna morreu com Alzheimer. Passou os ultimos 5 anos sem reconhecer
      os filhos. E minha mae sabia disso. Ela tava vendo o mesmo filme
      comecar de novo — so que dessa vez, ela era a protagonista.

      O fundo do poco foi num domingo. Minha mae saiu pra comprar pao na
      padaria da esquina. A padaria que ela ia todo dia ha 15 anos. Tres
      quadras da casa dela.

      Uma hora passou. Duas horas. Minha irma ligou desesperada: "Henrique,
      a mae saiu pra comprar pao e nao voltou."

      Eu sai de carro procurando. Encontrei ela sentada num banco de praca,
      a 6 quadras de casa, com o saco de pao na mao, chorando. Quando eu
      cheguei perto, ela olhou pra mim com os olhos vermelhos e falou uma
      frase que eu nunca vou esquecer:

      "Filho, eu nao lembrava o caminho de volta pra casa."

      Eu abracei minha mae ali naquele banco. Senti ela tremendo no meu colo.
      E pensei: essa e a mulher que decorava medidas de costura de cabeca.
      Que lembrava o aniversario de todo mundo. Que nunca esquecia de nada.
      E agora nao lembra o caminho de 3 quadras ate a propria casa.

      Naquela noite, depois de deixar minha mae em casa e esperar ela dormir,
      eu fui pro meu escritorio. Sentei na frente do computador. E fiz uma
      promessa pra mim mesmo.

      Eu pensei: eu sou neurocientista. Estudei o cerebro a vida inteira.
      Se eu nao conseguir ajudar a minha propria mae, de que adianta tudo que
      eu estudei? Todos os artigos que eu publiquei? Todos os titulos?

      Naquela madrugada, eu comecei a pesquisar de um jeito diferente. Nao ia
      aceitar a resposta de "e a idade". Tinha que existir algo que a medicina
      convencional estava deixando passar. E eu ia encontrar.

  discovery_story:
    tipo: "viagem"
    destino: "Okinawa, Japao — Vila de Ogimi (Vila dos Centenarios)"
    duracao: "14 dias"
    conexao_pergunta_paradoxal: >
      Big Idea pergunta como japoneses de Okinawa tem memoria afiada ate 100 anos
      com alimento fermentado. Discovery Story conta COMO o Dr. Henrique descobriu
      isso — encontrou artigo, viajou ate Okinawa, conheceu Dona Yuki (94 anos),
      viu o alimento fermentado, conectou intestino com cerebro.
    personagem_chave: "Dona Yuki, 94 anos, ex-professora que lembra nomes de todos os alunos"
    momento_eureka: "Na cozinha da Dona Yuki, vendo ela preparar o alimento fermentado"
    texto: |
      Passei semanas pesquisando. Artigos, meta-analises, estudos clinicos. Li
      mais de 300 publicacoes sobre declinio cognitivo. Meus olhos ardiam, dormia
      3, 4 horas por noite. Mas as respostas eram sempre as mesmas: "degeneracao
      natural", "predisposicao genetica", "sem cura conhecida".

      Ate que numa madrugada de quarta-feira, as 3 da manha, encontrei um artigo
      no Journal of Neurogastroenterology — um jornal pequeno, que pouca gente le
      — publicado por uma equipe de pesquisadores da Universidade de Okinawa.

      O artigo mostrava algo que me fez sentar na cadeira: em Okinawa, a regiao
      com a maior concentracao de centenarios do mundo, a taxa de demencia e
      Alzheimer e 6 vezes menor que a media global. Homens e mulheres de 90, 95,
      100 anos com a memoria intacta. Fazendo contas de cabeca. Lembrando de
      nomes, datas, eventos de decadas atras.

      Mas o que me chocou nao foi isso. Foi a conclusao do estudo. Os
      pesquisadores descobriram que o segredo NAO estava no cerebro dessas
      pessoas. Estava no intestino.

      Os centenarios de Okinawa tinham uma flora intestinal completamente
      diferente de qualquer outra populacao estudada. E a razao? Um alimento
      fermentado tradicional que eles consumiam todo dia — e que alimentava
      bacterias especificas que produziam uma substancia que o cerebro precisa
      pra funcionar.

      Eu pensei: "isso e bom demais pra ser verdade." Mas os dados eram solidos.
      Referenciavam mais 12 estudos de universidades diferentes — Stanford,
      Harvard, Instituto Pasteur.

      Duas semanas depois, eu estava num aviao pra Okinawa. Deixei tudo —
      consultorio, palestras, compromissos. Passei 14 dias na regiao de Ogimi,
      a "Vila dos Centenarios". Conversei com moradores, observei a alimentacao,
      visitei mercados, acompanhei a rotina de idosos com mais de 90 anos.

      E foi la, na cozinha de uma senhora de 94 anos chamada Yuki, que eu
      entendi tudo. Dona Yuki preparou na minha frente o alimento fermentado
      que ela come todo dia desde crianca. E quando eu perguntei se ela
      esquecia as coisas, ela riu e falou: "Esquecer? Eu lembro do nome de
      cada aluno que tive quando era professora. E me aposentei ha 30 anos."

      Naquele momento, tudo fez sentido. A resposta pra memoria nunca esteve
      no cerebro. Estava no intestino — no segundo cerebro — que estava faminto.
      E eu precisava levar essa descoberta de volta pro Brasil.

      Foi assim que eu descobri o que eu chamo de Sindrome do Cerebro Faminto —
      e o Truque do Fermento que os japoneses de Okinawa usam ha seculos sem
      saber que estao protegendo o cerebro pela barriga.

