      gp_30_days: "$6,000"
      ratio_30_days: "12:1"
      gp_12_months: "$48,000"
      ratio_12_months: "96:1"

    offer_stack:
      - offer: "Free book + lead magnet + podcast"
        type: "Attraction"
      - offer: "Free strategy call"
        type: "Attraction"
        note: "'Deixe seu cartão em casa, só queremos ajudar'"
      - offer: "$16,000 'Fill Your Gym' Intensive"
        type: "Core"
        terms: "$1,000 down + $1,000/week"
      - offer: "Supplement Selling Secrets (FREE training)"
        type: "Upsell"
        resultado: "$1.7M/month no primeiro mês"
      - offer: "Free Feedback Call (halfway point)"
        type: "Continuity upsell"
        resultado: "Converte para $3,200/mo licensing"

    citacao: |
      "Se eu tenho um investimento onde você paga $500 e eu te pago $48,000 de volta
      no final do ano, e você pode fazer quantas vezes quiser — você faria orçamento?
      É por isso que a ideia de 'budget de marketing' é ridícula."

    principio: "Simple scales. Você quer o mínimo de ofertas possível que permita fazer o máximo de GP no menor tempo."

    uso_recomendado:
      - "Para demonstrar CFA Level 3 em ação"
      - "Para estruturar offer stack completo"
      - "Para eliminar mentalidade de 'budget de marketing'"

  # ─────────────────────────────────────────────────────────────────────────────
  # CASO 15: THE ECONOMIST DECOY
  # Source: MM_19_MenuUpsell.md
  # ─────────────────────────────────────────────────────────────────────────────
  economist_decoy:
    id: "CASE-015"
    name: "The Economist Decoy Pricing"
    arquetipo: "Decoy Pricing, Menu Upsell"
    source: "$100M Money Models - Module 19"

    contexto: |
      The Economist oferecia:
      - Digital ($59/ano)
      - Digital+Print ($125/ano)
      Todos escolhiam $59 digital.

    intervencao:
      solucao: "Adicionar decoy — Print Only por $125/ano"
      opcoes_novas:
        - option: "A"
          desc: "Digital only"
          price: "$59/ano"
        - option: "B"
          desc: "Print only (DECOY)"
          price: "$125/ano"
        - option: "C"
          desc: "Digital + Print"
          price: "$125/ano"

    resultado: |
      Agora C parece 'ganho digital grátis com minha assinatura print.'
      Vendas de C dispararam.

    regra: |
      "Se você tem duas coisas e quer que pessoas comprem ambas,
      adicione uma terceira opção com preço do item mais caro mas só um dos dois itens."

    uso_recomendado:
      - "Para aumentar adesão a pacotes completos"
      - "Para pricing de assinaturas"
      - "Para criar percepção de valor"

  # ─────────────────────────────────────────────────────────────────────────────
  # CASO 16: $5 VIP TANNING - Turkey Talk Origin
  # Source: MM_13_DecoyOffers.md
  # ─────────────────────────────────────────────────────────────────────────────
  vip_tanning_decoy:
    id: "CASE-016"
    name: "$5 VIP Tanning (Turkey Talk + Decoy Origin)"
    arquetipo: "Decoy Offer, Belief Education"
    source: "$100M Money Models - Module 13"

    contexto: |
      John (mentor de Hormozi, 22 salões de bronzeamento) vendia
      cartões VIP de $5 para passes de 5 dias.

    intervencao:
      insight_chave: "Pessoas não sabem quanto tempo leva para bronzear"
      turkey_talk: |
        "Você não pode cozinhar um peru mais rápido aumentando o fogo —
        você só vai queimar ele."
      resultado: "Clientes entendiam que precisavam de múltiplas sessões"
      escolha:
        opcao_a: "$25/sessão avulsa"
        opcao_b: "$19.99/mês ilimitado (com $5 creditado)"
      conversao: "Quase todos escolhiam a mensalidade"

    principios:
      - "Turkey Talk: educar ANTES de apresentar opções"
      - "Decoy faz a opção premium parecer óbvia"
      - "70-80% devem escolher premium — se não, free está bom demais"

    aplicacao_gym_launch: "Free 21-Day Transformation quando ads pararam de performar"

    uso_recomendado:
      - "Para qualquer negócio com curva de aprendizado"
      - "Para converter free leads em membros"
      - "Quando precisar educar sobre tempo necessário para resultados"

  # ─────────────────────────────────────────────────────────────────────────────
  # CASO 17: 3X CLOSE RATE - Feature Downsell
  # Source: MM_25_FeatureDownsells.md
  # ─────────────────────────────────────────────────────────────────────────────
  feature_downsell_guarantee:
    id: "CASE-017"
    name: "3x Close Rate (Remove Guarantee Downsell)"
    arquetipo: "Feature Downsell, Close Rate Optimization"
    source: "$100M Money Models - Module 25"

    contexto: |
      Amigo de Hormozi tinha close rate de 25%.
      Oferta de $4K com garantia.

    intervencao:
      tecnica: "Remover garantia como feature downsell"
      oferta_original: "$4,000 com garantia"
      downsell: "$2,000 sem garantia"

    resultado:
      antes: "25/100 fechavam"
      depois:
        premium: "35/100 compraram $4K (re-upsold themselves)"
        downsell: "40/100 compraram $2K"
        total: "75/100 = 3x close rate"

    principios:
      - "Primeiro downsell: remover feature de ALTO valor, queda PEQUENA de preço"
      - "Muitos se re-upsell sozinhos quando percebem o que perdem"
      - "Segundo downsell: remover features de BAIXO valor, queda GRANDE de preço"

    processo_padrao:
      - step: 1
        acao: "Remover feature mais valiosa (garantia)"
        preco: "Queda pequena"
        resultado: "Muitos voltam para oferta original"
      - step: 2
        acao: "Colocar feature de volta, remover features menores"
        preco: "Queda grande"
        resultado: "Melhor deal para quem quer economizar"
      - step: 3
        acao: "Temperature check: '1-10, quanto você quer isso?'"
        decisao: "8+ = continuar | <8 = pivotar para payment plans"

    uso_recomendado:
      - "Para aumentar close rate sem baixar preço"
      - "Para descobrir quais features clientes realmente valorizam"
      - "Para criar opções de entrada"

  # ─────────────────────────────────────────────────────────────────────────────
  # CASO 18: ZERO CHURN CONSULTANT - Waived Fee
  # Source: MM_29_WaivedFee.md
  # ─────────────────────────────────────────────────────────────────────────────
  zero_churn_consultant:
    id: "CASE-018"
    name: "Zero Churn Consultant (Waived Fee Model)"
    arquetipo: "Waived Fee, Churn Elimination"
    source: "$100M Money Models - Module 29"

    contexto: |
      Consultor amigo de Hormozi.
      Zero churn. Zero marketing.

    modelo:
      opcao_a:
        tipo: "Month-to-month"
        mensal: "$4,000"
        fee: "$25,000 upfront"
        commitment: "Nenhum"
      opcao_b:
        tipo: "Commitment"
        mensal: "$4,000"
        fee: "$0 (waived)"
        commitment: "12 meses"
        penalidade: "Se cancelar antes, paga os $25K"

    resultado: "Quase todos escolhem o ano"

    psicologia: |
      O mesmo motivo que fez assinar (evitar taxa) é o mesmo que faz ficar
      (evitar taxa se cancelar). Passa pelas montanhas russas emocionais.
      Após metade do período, ficar é mais barato que sair.

    fee_sizing:
      maior: "Mais pessoas escolhem commitment (menos cash upfront)"
      menor: "Mais pessoas vão month-to-month (mais cash upfront)"
      sweet_spot: "1.5x monthly = 33% split entre opções"

    uso_recomendado:
      - "Para serviços que demoram para mostrar resultados"
      - "Para eliminar churn emocional"
      - "Para aumentar LTV sem forçar contratos"

  # ─────────────────────────────────────────────────────────────────────────────
  # CASO 19: 5-DAY CHALLENGE STRUCTURE
  # Source: MM_16_FreeWithConsumption.md
  # ─────────────────────────────────────────────────────────────────────────────
  five_day_challenge:
    id: "CASE-019"
    name: "5-Day Challenge Structure (Belief Breaking)"
    arquetipo: "Free With Consumption, Challenge Framework"
    source: "$100M Money Models - Module 16 (BONUS - Not in Book)"

    estrutura:
      monday:
        conteudo: "Sua história, por que é como a deles, mudança de perspectiva"
        proposito: "Construir conexão + reframing"
      tuesday:
        conteudo: "Nugget valioso sobre medo #1 ('Não consigo fazer isso')"
        proposito: "Quebrar crença #1: circunstâncias"
      wednesday:
        conteudo: "Abordar desculpa externa ('Outras coisas vão me bloquear')"
        proposito: "Quebrar crença #2: outras pessoas"
      thursday:
        conteudo: "Hint da oferta principal vindo amanhã"
        proposito: "Construir antecipação"
      friday:
        conteudo: "Pitch + stack da oferta"
        proposito: "Converter"
      saturday:
        conteudo: "Q&A + repitch com prova (cases, stories)"
        proposito: "Lidar com objeções + social proof"

    three_beliefs_to_break:
      circumstances:
        crenca: "'Não tenho dinheiro/tempo'"
        reframe: "É sobre resourcefulness e priorização, não circunstâncias"
      other_people:
        crenca: "'Meu cônjuge/filhos/funcionários vão me impedir'"
        reframe: "Você é responsável pela sua própria vida. Isso ajuda seus relacionamentos"
      self:
        crenca: "'Não consigo. E se eu falhar?'"
        reframe: "Hoje é apenas o primeiro dia de uma decisão que você vem tomando há muito tempo"

    benchmarks:
      webinar: "10% dos participantes ao vivo convertem"
      strategy_call: "25%+ convertem para próximo passo"
      challenge_virtual: "2-5% dos opt-ins convertem (mass market)"

    runway_principle: |
      "The bigger the plane, the longer the runway."
      Preço relativo ao poder de compra determina formato necessário.

    uso_recomendado:
      - "Para high-ticket que precisa de trust building"
      - "Para quebrar crenças limitantes antes de vender"
      - "Quando webinar não converte o suficiente"

