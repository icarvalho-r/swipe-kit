      - "data/reports/{niche_slug}/"

  changelog:
    - version: "1.0.0"
      date: "2026-02-09"
      changes:
        - "Versao inicial do workflow wf-niche-scan"
        - "6 fases com checkpoints blocking"
        - "Scorecard de autoridade com 15 criterios"
        - "Red flags criticas e de alerta"
        - "Classificacao por tamanho com 5 tiers"
        - "5 dimensoes de qualidade de conteudo"
        - "Score final ponderado com 4 componentes"
        - "Template completo do relatorio final"
