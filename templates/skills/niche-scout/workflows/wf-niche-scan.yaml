  usage_notes: |
    Este workflow e o pipeline PRINCIPAL do squad niche-scout.
    Deve ser acionado quando o usuario quer pesquisar um nicho completo.

    Para analise de um perfil especifico (ja conhecido), usar wf-profile-deep-dive.

    O workflow e sequencial: cada fase depende da anterior. Nao e possivel
    pular fases ou executar fora de ordem.

    O tempo estimado (2-4 horas) varia conforme:
